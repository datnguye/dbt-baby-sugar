name: CI PR

on:
  pull_request:
    branches: [ main ]
    paths:
      - "dbt_baby_sugar/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci_pr.yml"

permissions: read-all

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Cache UV dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-${{ matrix.python-version }}-uv-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.python-version }}-uv-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (format-check + ruff)
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Run tests at 100% coverage
        run: uv run pytest --cov=dbt_baby_sugar --cov-report=term-missing --cov-fail-under=100
